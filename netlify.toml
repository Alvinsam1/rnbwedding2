[build]
  command = "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile=false && pnpm --filter @workspace/wedding build"
  publish = "artifacts/wedding/dist/public"
  functions = "netlify/functions"

[build.environment]
  # Required by artifacts/wedding/vite.config.ts at build time.
  # PORT only matters for local dev servers; any value works for a static build.
  PORT = "5173"
  BASE_PATH = "/"
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

# Client-side routing (wouter) — let index.html handle unknown paths.
# The RSVP/admin API paths above are registered directly by the functions'
# own `config.path`, so they're matched before this catch-all.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
