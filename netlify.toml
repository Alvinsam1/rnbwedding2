[build]
  command = "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile=false && pnpm --filter @workspace/wedding build"
  publish = "artifacts/wedding/dist/public"
  functions = "netlify/functions"

[build.environment]
  # Required by artifacts/wedding/vite.config.ts at build time.
  # PORT only matters for local dev servers; any value works for a static build.
  PORT = "5173"
  BASE_PATH = "/"
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

# API routes — explicit + forced so they always win over the SPA
# catch-all below, regardless of routing order.
[[redirects]]
  from = "/api/rsvps/summary"
  to = "/.netlify/functions/rsvps-summary"
  status = 200
  force = true

[[redirects]]
  from = "/api/rsvps"
  to = "/.netlify/functions/rsvps"
  status = 200
  force = true

# Client-side routing (wouter) — let index.html handle unknown paths.
# Must stay LAST: redirects are matched top-to-bottom, first match wins.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
